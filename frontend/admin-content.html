<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Content - EduMate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="shared.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <div class="layout admin-layout">
      <aside class="sidebar">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          </div>
          <span class="logo-text">Edu<span>Mate</span></span>
        </div>

        <div class="nav-section">
          <p class="nav-label">Admin Panel</p>
          <a class="nav-item" href="admin.html">Overview</a>
          <a class="nav-item" href="admin-users.html">Users</a>
          <a class="nav-item" href="admin-exams.html">Exams</a>
          <a class="nav-item active" href="admin-content.html">Content</a>
          <a class="nav-item" href="admin-reports.html">Reports</a>
        </div>
      </aside>

      <div class="main">
        <div class="topbar">
          <span class="topbar-title">Content Review</span>
          <div class="topbar-right">
            <a class="avatar logout-btn" href="index.html" aria-label="Logout">Logout</a>
          </div>
        </div>

        <div class="content admin-content">
          <div class="page-header">
            <h1>Content moderation</h1>
            <p>Approve and manage newly uploaded resources before they appear to students.</p>
          </div>

          <section class="panel" id="content">
            <div class="panel-header">
              <h2>Review submissions</h2>
              <div style="display: flex; gap: 8px;">
                <button class="btn btn-small" id="refreshContent">Refresh</button>
                <button class="btn btn-small" id="approveAll">Approve all</button>
              </div>
            </div>
            <p>Approve or deny newly submitted learning material.</p>
            <div class="panel-tools">
              <input type="search" id="contentSearch" class="filter-input" placeholder="Search pending content by title" />
              <select id="contentTypeFilter" class="filter-select">
                <option value="all">All types</option>
              </select>
            </div>
            <ul class="content-list" id="contentList"></ul>
          </section>
        </div>
      </div>
    </div>

    <script src="admin.js"></script>
  </body>
</html>
