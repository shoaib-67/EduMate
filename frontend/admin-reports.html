<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Reports - EduMate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="shared.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <div class="layout admin-layout">
      <aside class="sidebar">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          </div>
          <span class="logo-text">Edu<span>Mate</span></span>
        </div>

        <div class="nav-section">
          <p class="nav-label">Admin Panel</p>
          <a class="nav-item" href="admin.html">Overview</a>
          <a class="nav-item" href="admin-users.html">Users</a>
          <a class="nav-item" href="admin-exams.html">Exams</a>
          <a class="nav-item" href="admin-content.html">Content</a>
          <a class="nav-item active" href="admin-reports.html">Reports</a>
        </div>
      </aside>

      <div class="main">
        <div class="topbar">
          <span class="topbar-title">Reports</span>
          <div class="topbar-right">
            <a class="avatar logout-btn" href="index.html" aria-label="Logout">Logout</a>
          </div>
        </div>

        <div class="content admin-content">
          <div class="page-header">
            <h1>Review reports</h1>
            <p>Investigate recent site alerts and flagged content items.</p>
          </div>

          <section class="panel panel-full" id="reports">
            <div class="panel-header">
              <h2>Recent reports</h2>
              <button class="btn btn-small" id="refreshReports" style="margin-left: auto;">Refresh</button>
              <span class="badge" id="reportBadge">0 open</span>
            </div>
            <p>Investigate flagged activity and take action.</p>
            <div class="panel-tools">
              <input type="search" id="reportSearch" class="filter-input" placeholder="Search reports by title" />
              <select id="reportCategoryFilter" class="filter-select">
                <option value="all">All categories</option>
                <option value="complaint">Complaints</option>
                <option value="bug">Bugs</option>
                <option value="content">Content issues</option>
              </select>
              <select id="reportStatusFilter" class="filter-select">
                <option value="open">Open only</option>
                <option value="all">All statuses</option>
                <option value="completed">Completed</option>
                <option value="denied">Denied</option>
                <option value="pending">Pending</option>
              </select>
              <select id="reportPriorityFilter" class="filter-select">
                <option value="all">All priorities</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
            </div>
            <div class="report-grid" id="reportCards"></div>
          </section>
        </div>
      </div>
    </div>

    <script src="admin.js"></script>
  </body>
</html>
