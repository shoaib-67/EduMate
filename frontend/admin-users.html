<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Users - EduMate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="shared.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <div class="layout admin-layout">
      <aside class="sidebar">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          </div>
          <span class="logo-text">Edu<span>Mate</span></span>
        </div>

        <div class="nav-section">
          <p class="nav-label">Admin Panel</p>
          <a class="nav-item" href="admin.html">Overview</a>
          <a class="nav-item active" href="admin-users.html">Users</a>
          <a class="nav-item" href="admin-content.html">Content</a>
          <a class="nav-item" href="admin-reports.html">Reports</a>
        </div>
      </aside>

      <div class="main">
        <div class="topbar">
          <span class="topbar-title">User Management</span>
          <div class="topbar-right">
            <a class="avatar logout-btn" href="index.html" aria-label="Logout">Logout</a>
          </div>
        </div>

        <div class="content admin-content">
          <div class="page-header">
            <h1>User accounts</h1>
            <p>Review user roles, check statuses, and manage access across the platform.</p>
          </div>

          <section class="panel" id="users">
            <div class="panel-header">
              <div class="panel-title-group">
                <h2>Manage users</h2>
                <p>Add student and instructor accounts, freeze access, or remove accounts.</p>
              </div>
              <div class="panel-actions">
                <button class="btn btn-small" id="toggleAddUserForm" type="button">Add account</button>
              </div>
            </div>
            <form class="admin-user-form is-hidden" id="addUserForm">
              <div class="form-grid">
                <label>
                  <span>Name</span>
                  <input type="text" name="fullName" placeholder="Full name" required />
                </label>
                <label>
                  <span>Email</span>
                  <input type="email" name="email" placeholder="name@example.com" required />
                </label>
                <label>
                  <span>Phone</span>
                  <input type="tel" name="phone" placeholder="+880..." />
                </label>
                <label>
                  <span>Role</span>
                  <select name="role" required>
                    <option value="student">Student</option>
                    <option value="instructor">Instructor</option>
                  </select>
                </label>
                <label>
                  <span>Password</span>
                  <input type="password" name="password" placeholder="At least 8 characters" required minlength="8" />
                </label>
              </div>
              <div class="form-actions">
                <p id="userFormMessage" class="form-message" aria-live="polite"></p>
                <button class="btn btn-small" type="submit" id="addUserButton">Create account</button>
              </div>
            </form>
            <div class="panel-tools">
              <input type="search" id="userSearch" class="filter-input" placeholder="Search users by name or email" />
              <select id="userRoleFilter" class="filter-select">
                <option value="all">All roles</option>
                <option value="Student">Student</option>
                <option value="Instructor">Instructor</option>
                <option value="Admin">Admin</option>
              </select>
              <select id="userStatusFilter" class="filter-select">
                <option value="all">All statuses</option>
                <option value="Active">Active</option>
                <option value="Pending">Pending</option>
                <option value="Inactive">Inactive</option>
                <option value="Frozen">Frozen</option>
              </select>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="userTableBody"></tbody>
              </table>
            </div>
          </section>
        </div>
      </div>
    </div>

    <script src="admin.js"></script>
  </body>
</html>
